function getRank(lvl){
  let r=RANKS[0];
  for(const rank of RANKS){if(lvl>=rank.min)r=rank;}
  return r;
}

const TIME_BY_LVL=(lvl)=>{
  if(lvl<=20)return 30;
  if(lvl<=40)return 25;
  if(lvl<=60)return 22;
  if(lvl<=80)return 20;
  return 18;
};

// =============== STORAGE ===============
const STORAGE_KEY='kelajak_typing_v2';
function loadData(){
  try{const d=localStorage.getItem(STORAGE_KEY);return d?JSON.parse(d):null;}
  catch{return null;}
}
function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{}}

// =============== LOGIN SCREEN ===============
function LoginScreen({onLogin}){
  const [tab,setTab]=useState('login');
  const [form,setForm]=useState({username:'',password:'',name:'',school:'45-sonli maktab',grade:'7'});
  const [err,setErr]=useState('');

  const handle=(field,val)=>setForm(p=>({...p,[field]:val}));

  const doRegister=()=>{
    if(!form.username.trim()||!form.password.trim()||!form.name.trim()){setErr('Barcha maydonlarni to\'ldiring');return;}
    const all=JSON.parse(localStorage.getItem('kelajak_users')||'{}');
    if(all[form.username]){setErr('Bu foydalanuvchi nomi band');return;}
    const user={username:form.username,password:form.password,name:form.name,school:form.school,grade:form.grade,level:1,xp:0,completedLevels:[],stats:{totalTexts:0,totalWpm:0,totalAcc:0,games:0,avgWpm:0,avgAcc:0}};
    all[form.username]=user;
    localStorage.setItem('kelajak_users',JSON.stringify(all));
    onLogin(user);
  };

  const doLogin=()=>{
    if(!form.username.trim()||!form.password.trim()){setErr('Foydalanuvchi nomi va parolni kiriting');return;}
    const all=JSON.parse(localStorage.getItem('kelajak_users')||'{}');
    const u=all[form.username];
    if(!u||u.password!==form.password){setErr('Noto\'g\'ri foydalanuvchi nomi yoki parol');return;}
    onLogin(u);
  };

  const inpStyle={width:'100%',background:'#111827',border:'1px solid #222d42',borderRadius:8,padding:'10px 14px',color:'#f1f5f9',fontSize:15,outline:'none',marginBottom:12};
  const btnStyle={width:'100%',padding:'12px',borderRadius:10,border:'none',fontSize:15,fontWeight:600,cursor:'pointer'};

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem',background:'radial-gradient(ellipse at 50% 0%,#1a1040 0%,#0a0f1e 70%)'}}>
      <div style={{width:'100%',maxWidth:420,animation:'fadeIn .5s ease'}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:48,marginBottom:8}}>⌨️</div>
          <h1 style={{fontSize:26,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>Kelajak Texnologiyalari</h1>
          <p style={{color:'#64748b',fontSize:14}}>Typing O'yini — 100 Daraja</p>
        </div>
        <div style={{background:'#111827',borderRadius:16,padding:'2rem',border:'1px solid #1a2235'}}>
          <div style={{display:'flex',marginBottom:20,background:'#0a0f1e',borderRadius:8,padding:4}}>
            {['login','register'].map(t=>(
              <button key={t} onClick={()=>{setTab(t);setErr('');}} style={{flex:1,padding:'8px',borderRadius:6,border:'none',fontSize:14,fontWeight:500,background:tab===t?'#1a2235':'transparent',color:tab===t?'#f1f5f9':'#64748b',transition:'all .2s'}}>
                {t==='login'?'Kirish':'Ro\'yxatdan o\'tish'}
              </button>
            ))}
          </div>
          {tab==='register'&&<input style={inpStyle} placeholder="Ismingiz" value={form.name} onChange={e=>handle('name',e.target.value)}/>}
          <input style={inpStyle} placeholder="Foydalanuvchi nomi" value={form.username} onChange={e=>handle('username',e.target.value)}/>
          <input style={inpStyle} type="password" placeholder="Parol" value={form.password} onChange={e=>handle('password',e.target.value)}/>
          {tab==='register'&&(
            <>
              <input style={inpStyle} placeholder="Maktab (masalan: 45-sonli maktab)" value={form.school} onChange={e=>handle('school',e.target.value)}/>
              <input style={inpStyle} placeholder="Sinf (masalan: 7)" value={form.grade} onChange={e=>handle('grade',e.target.value)}/>
            </>
          )}
          {err&&<div style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:8,padding:'8px 12px',color:'#ef4444',fontSize:13,marginBottom:12}}>{err}</div>}
          <button onClick={tab==='login'?doLogin:doRegister} style={{...btnStyle,background:'linear-gradient(135deg,#4f8ef7,#7c3aed)',color:'#fff'}}>
            {tab==='login'?'Kirish ↗':'Hisob ochish ↗'}
          </button>
        </div>
      </div>
    </div>
  );
}

// =============== ASOSIY O'YIN ===============
function TypingGame({user:initUser,onLogout}){
  const [user,setUser]=useState(initUser);
  const [screen,setScreen]=useState('menu'); // menu|game|result|cert|levelmap
  const [currentText,setCurrentText]=useState(null);
  const [typed,setTyped]=useState('');
  const [timeLeft,setTimeLeft]=useState(30);
  const [started,setStarted]=useState(false);
  const [finished,setFinished]=useState(false);
  const [result,setResult]=useState(null);
  const [showLevelUp,setShowLevelUp]=useState(false);
  const [confettis,setConfettis]=useState([]);
  const inputRef=useRef(null);
  const timerRef=useRef(null);
  const startRef=useRef(null);

  const saveUser=(u)=>{
    const all=JSON.parse(localStorage.getItem('kelajak_users')||'{}');
    all[u.username]=u;
    localStorage.setItem('kelajak_users',JSON.stringify(all));
    setUser(u);
  };

  const startLevel=(lvl)=>{
    const t=ALL_TEXTS.find(x=>x.lvl===lvl);
    if(!t)return;
    setCurrentText(t);
    setTyped('');
    setTimeLeft(TIME_BY_LVL(lvl));
    setStarted(false);
    setFinished(false);
    setResult(null);
    setScreen('game');
    setTimeout(()=>inputRef.current?.focus(),100);
  };

  const spawnConfetti=()=>{
    const c=Array.from({length:30},(_,i)=>({
      id:i,x:Math.random()*100,color:['#f59e0b','#4f8ef7','#10b981','#ef4444','#8b5cf6'][i%5],
      delay:Math.random()*1,dur:2+Math.random()*2,size:6+Math.random()*8
    }));
    setConfettis(c);
    setTimeout(()=>setConfettis([]),4000);
  };

  useEffect(()=>{
    if(!started||finished)return;
    timerRef.current=setInterval(()=>{
      setTimeLeft(p=>{
        if(p<=1){clearInterval(timerRef.current);finishGame(false);return 0;}
        return p-1;
      });
    },1000);
    return()=>clearInterval(timerRef.current);
  },[started,finished]);

  const finishGame=(success)=>{
    clearInterval(timerRef.current);
    setFinished(true);
    const elapsed=startRef.current?(Date.now()-startRef.current)/1000:1;
    const t=currentText.text;
    let errors=0,correct=0;
    const tv=typed.slice(0,t.length);
    for(let i=0;i<tv.length;i++){if(tv[i]===t[i])correct++;else errors++;}
    const acc=tv.length>0?Math.round(correct/tv.length*100):0;
    const wpm=Math.round((tv.length/5)/(elapsed/60));
    const passed=success&&acc>=70&&tv.length>=t.length*0.9;
    const r={wpm,acc,errors,time:Math.round(elapsed),passed,lvl:currentText.lvl};
    setResult(r);

    if(passed){
      spawnConfetti();
      const newUser={...user};
      if(!newUser.completedLevels.includes(currentText.lvl)){
        newUser.completedLevels=[...newUser.completedLevels,currentText.lvl];
        newUser.xp=(newUser.xp||0)+currentText.lvl*10;
        const newLvl=Math.max(...newUser.completedLevels);
        if(newLvl>user.level){newUser.level=newLvl+1;setShowLevelUp(true);setTimeout(()=>setShowLevelUp(false),2500);}
      }
      newUser.stats={
        ...newUser.stats,
        totalTexts:(newUser.stats.totalTexts||0)+1,
        games:(newUser.stats.games||0)+1,
        totalWpm:(newUser.stats.totalWpm||0)+wpm,
        totalAcc:(newUser.stats.totalAcc||0)+acc,
        avgWpm:Math.round(((newUser.stats.totalWpm||0)+wpm)/((newUser.stats.games||0)+1)),
        avgAcc:Math.round(((newUser.stats.totalAcc||0)+acc)/((newUser.stats.games||0)+1)),
      };
      saveUser(newUser);
    }
    setScreen('result');
  };

  const handleInput=(e)=>{
    if(finished)return;
    const val=e.target.value;
    if(!started&&val.length>0){setStarted(true);startRef.current=Date.now();}
    setTyped(val);
    if(val.length>=currentText.text.length){finishGame(true);}
  };

  const handleKeyDown=(e)=>{
    if(e.key==='Tab'){e.preventDefault();}
  };

  const rank=getRank(user.completedLevels?.length||0);
  const progress=user.completedLevels?.length||0;

  // SERTIFIKAT
  if(screen==='cert'){
    return <Certificate user={user} onBack={()=>setScreen('menu')}/>;
  }

  // O'YIN EKRANI
  if(screen==='game'&&currentText){
    const t=currentText.text;
    const chars=t.split('').map((ch,i)=>{
      let cls='';
      if(i<typed.length){cls=typed[i]===ch?'correct':'wrong';}
      else if(i===typed.length){cls='cursor';}
      return{ch,cls};
    });
    const pct=Math.round(timeLeft/TIME_BY_LVL(currentText.lvl)*100);
    const timerColor=timeLeft>10?'#10b981':timeLeft>5?'#f59e0b':'#ef4444';

    return(
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem',background:'radial-gradient(ellipse at 50% 0%,#1a1040 0%,#0a0f1e 70%)'}}>
        {confettis.map(c=>(
          <div key={c.id} style={{position:'fixed',left:c.x+'%',top:'-20px',width:c.size,height:c.size,background:c.color,borderRadius:2,animation:`confetti ${c.dur}s ${c.delay}s ease-in forwards`,zIndex:999,pointerEvents:'none'}}/>
        ))}
        {showLevelUp&&(
          <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',zIndex:1000,textAlign:'center',animation:'levelup .5s ease',background:'linear-gradient(135deg,#1a2235,#0f1729)',border:'2px solid #f59e0b',borderRadius:20,padding:'2rem 3rem',pointerEvents:'none'}}>
            <div style={{fontSize:48}}>⬆️</div>
            <div style={{fontSize:24,fontWeight:700,color:'#f59e0b'}}>Daraja oshdi!</div>
            <div style={{color:'#94a3b8',fontSize:14}}>Yangi daraja: {user.level}</div>
          </div>
        )}
        <div style={{width:'100%',maxWidth:680,animation:'fadeIn .3s ease'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <button onClick={()=>{clearInterval(timerRef.current);setScreen('menu');}} style={{background:'rgba(255,255,255,0.05)',border:'1px solid #222d42',color:'#94a3b8',borderRadius:8,padding:'6px 14px',fontSize:13}}>
              ← Orqaga
            </button>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{background:'rgba(79,142,247,0.15)',border:'1px solid rgba(79,142,247,0.3)',color:'#4f8ef7',borderRadius:20,padding:'4px 12px',fontSize:12,fontWeight:600}}>
                {currentText.cat}
              </span>
              <span style={{color:'#64748b',fontSize:12}}>Daraja {currentText.lvl}</span>
            </div>
          </div>

          <div style={{display:'flex',gap:12,marginBottom:16}}>
            {[{val:timeLeft+'s',lbl:'Vaqt',color:timerColor},{val:(started&&typed.length>0)?Math.round((typed.length/5)/((Date.now()-startRef.current)/60000))+'':'0',lbl:"so'm/min",color:'#4f8ef7'},{val:typed.length+'/'+t.length,lbl:'Belgilar',color:'#8b5cf6'}].map((s,i)=>(
              <div key={i} style={{flex:1,background:'#111827',border:'1px solid #1a2235',borderRadius:10,padding:'10px',textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:700,color:s.color}}>{s.val}</div>
                <div style={{fontSize:11,color:'#64748b',marginTop:2}}>{s.lbl}</div>
              </div>
            ))}
          </div>

          <div style={{height:4,background:'#111827',borderRadius:9,marginBottom:16,overflow:'hidden'}}>
            <div style={{height:'100%',width:pct+'%',background:timerColor,borderRadius:9,transition:'width .5s linear'}}/>
          </div>

          <div style={{background:'#111827',border:'1px solid #1a2235',borderRadius:14,padding:'1.5rem',marginBottom:12,fontSize:20,lineHeight:1.8,fontFamily:'monospace',letterSpacing:.5,minHeight:80}}>
            {chars.map((c,i)=>{
              let style={};
              if(c.cls==='correct')style={color:'#10b981'};
              else if(c.cls==='wrong')style={color:'#ef4444',textDecoration:'underline',background:'rgba(239,68,68,0.15)',borderRadius:2};
              else if(c.cls==='cursor')style={borderLeft:'2px solid #4f8ef7',animation:'pulse 1s infinite',color:'#94a3b8'};
              else style={color:'#374151'};
              return<span key={i} style={style}>{c.ch===' '?'\u00a0':c.ch}</span>;
            })}
          </div>

          {!started&&(
            <div style={{textAlign:'center',color:'#64748b',fontSize:13,marginBottom:8}}>
              ⬇ Yozishni boshlang — vaqt avtomatik boshlanadi
            </div>
          )}

          <input
            ref={inputRef}
            value={typed}
            onChange={handleInput}
            onKeyDown={handleKeyDown}
            disabled={finished}
            autoComplete="off" spellCheck="false" autoCorrect="off"
            placeholder="Bu yerga yozing..."
            style={{width:'100%',background:'#111827',border:'2px solid #1a2235',borderRadius:10,padding:'14px 18px',color:'#f1f5f9',fontSize:16,outline:'none',transition:'border-color .2s',borderColor:started?'#4f8ef7':'#1a2235'}}
          />
        </div>
      </div>
    );
  }

  // NATIJA EKRANI
  if(screen==='result'&&result){
    return(
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem',background:'radial-gradient(ellipse at 50% 0%,#1a1040 0%,#0a0f1e 70%)'}}>
        {confettis.map(c=>(
          <div key={c.id} style={{position:'fixed',left:c.x+'%',top:'-20px',width:c.size,height:c.size,background:c.color,borderRadius:2,animation:`confetti ${c.dur}s ${c.delay}s ease-in forwards`,zIndex:999,pointerEvents:'none'}}/>
        ))}
        <div style={{width:'100%',maxWidth:500,animation:'fadeIn .4s ease'}}>
          <div style={{background:'#111827',border:`2px solid ${result.passed?'#10b981':'#ef4444'}`,borderRadius:20,padding:'2rem',textAlign:'center'}}>
            <div style={{fontSize:52,marginBottom:8}}>{result.passed?'🎉':'😅'}</div>
            <h2 style={{fontSize:24,fontWeight:700,color:result.passed?'#10b981':'#ef4444',marginBottom:4}}>
              {result.passed?'Muvaffaqiyatli!':'Vaqt tugadi yoki xatolar ko\'p'}
            </h2>
            <p style={{color:'#64748b',fontSize:14,marginBottom:24}}>
              {result.passed?`Daraja ${result.lvl} o'tdi! +${result.lvl*10} XP`:'Qayta urinib ko\'ring'}
            </p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:24}}>
              {[{v:result.wpm,l:"so'm/min"},{v:result.acc+'%',l:"To'g'rilik"},{v:result.time+'s',l:'Vaqt'},{v:result.errors,l:'Xatolar'}].map((s,i)=>(
                <div key={i} style={{background:'#0a0f1e',borderRadius:10,padding:'12px'}}>
                  <div style={{fontSize:22,fontWeight:700,color:'#f59e0b'}}>{s.v}</div>
                  <div style={{fontSize:12,color:'#64748b'}}>{s.l}</div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              <button onClick={()=>startLevel(result.lvl)} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:'rgba(79,142,247,0.15)',color:'#4f8ef7',fontSize:14,fontWeight:600,border:'1px solid rgba(79,142,247,0.3)'}}>
                🔄 Qayta
              </button>
              {result.passed&&result.lvl<100&&(
                <button onClick={()=>startLevel(result.lvl+1)} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:'linear-gradient(135deg,#4f8ef7,#7c3aed)',color:'#fff',fontSize:14,fontWeight:600}}>
                  ➡ Keyingi daraja
                </button>
              )}
              {result.passed&&result.lvl>=100&&(
                <button onClick={()=>setScreen('cert')} style={{flex:1,padding:'12px',borderRadius:10,border:'none',background:'linear-gradient(135deg,#f59e0b,#ef4444)',color:'#fff',fontSize:14,fontWeight:600}}>
                  🏆 Sertifikat olish
                </button>
              )}
              <button onClick={()=>setScreen('menu')} style={{flex:1,padding:'12px',borderRadius:10,border:'1px solid #222d42',background:'transparent',color:'#94a3b8',fontSize:14}}>
                🏠 Menyu
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // DARAJA XARITASI
  if(screen==='levelmap'){
    const groups=[];
    for(let i=0;i<100;i+=10){
      groups.push({start:i+1,end:i+10,cat:ALL_TEXTS[i].cat});
    }
    return(
      <div style={{minHeight:'100vh',background:'radial-gradient(ellipse at 50% 0%,#1a1040 0%,#0a0f1e 70%)',padding:'1.5rem'}}>
        <div style={{maxWidth:680,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
            <button onClick={()=>setScreen('menu')} style={{background:'rgba(255,255,255,0.05)',border:'1px solid #222d42',color:'#94a3b8',borderRadius:8,padding:'6px 14px',fontSize:13}}>← Orqaga</button>
            <h2 style={{fontSize:20,fontWeight:600,color:'#f1f5f9'}}>Daraja xaritasi</h2>
          </div>
          {groups.map((g,gi)=>(
            <div key={gi} style={{marginBottom:20}}>
              <div style={{fontSize:13,color:'#64748b',marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
                <span style={{background:'rgba(79,142,247,0.1)',color:'#4f8ef7',padding:'2px 10px',borderRadius:20,fontSize:12}}>{g.cat}</span>
                <span>Daraja {g.start}–{g.end}</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(10,1fr)',gap:6}}>
                {Array.from({length:10},(_,i)=>{
                  const lvl=g.start+i;
                  const done=user.completedLevels?.includes(lvl);
                  const unlocked=lvl===1||(user.completedLevels?.includes(lvl-1))||false;
                  return(
                    <button key={lvl} onClick={()=>{if(unlocked){startLevel(lvl);}}} style={{
                      aspectRatio:'1',borderRadius:8,border:'none',fontSize:12,fontWeight:600,cursor:unlocked?'pointer':'default',
                      background:done?'linear-gradient(135deg,#10b981,#059669)':unlocked?'rgba(79,142,247,0.15)':'#0a0f1e',
                      color:done?'#fff':unlocked?'#4f8ef7':'#374151',
                      border:`1px solid ${done?'#10b981':unlocked?'rgba(79,142,247,0.3)':'#1a2235'}`,
                      transition:'all .15s',
                    }}>
                      {done?'✓':unlocked?lvl:'🔒'}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
          {progress>=100&&(
            <div style={{textAlign:'center',marginTop:20}}>
              <button onClick={()=>setScreen('cert')} style={{background:'linear-gradient(135deg,#f59e0b,#ef4444)',border:'none',color:'#fff',borderRadius:12,padding:'14px 32px',fontSize:16,fontWeight:700}}>
                🏆 Sertifikatni ko'rish
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ASOSIY MENYU
  const nextLvl=progress+1<=100?progress+1:null;
  const xpToNext=nextLvl?(nextLvl*10):(100*10);
  const currentXp=user.xp||0;

  return(
    <div style={{minHeight:'100vh',background:'radial-gradient(ellipse at 50% 0%,#1a1040 0%,#0a0f1e 70%)',padding:'1.5rem'}}>
      <div style={{maxWidth:680,margin:'0 auto',animation:'fadeIn .4s ease'}}>
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:40,height:40,borderRadius:10,background:'linear-gradient(135deg,#4f8ef7,#7c3aed)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>
              {rank.icon}
            </div>
            <div>
              <div style={{fontWeight:600,color:'#f1f5f9',fontSize:15}}>{user.name}</div>
              <div style={{fontSize:12,color:rank.color}}>{rank.name}</div>
            </div>
          </div>
          <button onClick={onLogout} style={{background:'rgba(255,255,255,0.05)',border:'1px solid #222d42',color:'#94a3b8',borderRadius:8,padding:'6px 14px',fontSize:13}}>
            Chiqish
          </button>
        </div>

        {/* Progress */}
        <div style={{background:'#111827',border:'1px solid #1a2235',borderRadius:14,padding:'1.25rem',marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:13}}>
            <span style={{color:'#94a3b8'}}>Umumiy progress</span>
            <span style={{color:'#f59e0b',fontWeight:600}}>{progress}/100 daraja</span>
          </div>
          <div style={{height:8,background:'#0a0f1e',borderRadius:9,overflow:'hidden'}}>
            <div style={{height:'100%',width:progress+'%',background:'linear-gradient(90deg,#4f8ef7,#7c3aed)',borderRadius:9,transition:'width .5s'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:11,color:'#374151'}}>
            <span>{currentXp} XP</span>
            <span>{100*100} XP max</span>
          </div>
        </div>

        {/* Stats */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
          {[
            {v:progress,l:'Darajalar',icon:'🏅'},
            {v:user.stats?.avgWpm||0,l:"so'm/min",icon:'⚡'},
            {v:(user.stats?.avgAcc||0)+'%',l:"To'g'rilik",icon:'🎯'},
          ].map((s,i)=>(
            <div key={i} style={{background:'#111827',border:'1px solid #1a2235',borderRadius:12,padding:'14px',textAlign:'center'}}>
              <div style={{fontSize:20,marginBottom:4}}>{s.icon}</div>
              <div style={{fontSize:20,fontWeight:700,color:'#f59e0b'}}>{s.v}</div>
              <div style={{fontSize:11,color:'#64748b'}}>{s.l}</div>
            </div>
          ))}
        </div>

        {/* Actions */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {nextLvl&&(
            <button onClick={()=>startLevel(nextLvl)} style={{width:'100%',padding:'16px',borderRadius:14,border:'none',background:'linear-gradient(135deg,#4f8ef7,#7c3aed)',color:'#fff',fontSize:16,fontWeight:700,position:'relative',overflow:'hidden'}}>
              <span style={{position:'absolute',top:0,left:0,right:0,bottom:0,background:'linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent)',animation:'shine 2s infinite'}}/>
              ▶ {nextLvl}-daraja: {ALL_TEXTS[nextLvl-1]?.cat} — Boshlash
            </button>
          )}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <button onClick={()=>setScreen('levelmap')} style={{padding:'14px',borderRadius:12,border:'1px solid rgba(79,142,247,0.3)',background:'rgba(79,142,247,0.1)',color:'#4f8ef7',fontSize:14,fontWeight:600}}>
              🗺 Barcha darajalar
            </button>
            {progress>=100?(
              <button onClick={()=>setScreen('cert')} style={{padding:'14px',borderRadius:12,border:'1px solid rgba(245,158,11,0.4)',background:'rgba(245,158,11,0.15)',color:'#f59e0b',fontSize:14,fontWeight:600}}>
                🏆 Sertifikat
              </button>
            ):(
              <button onClick={()=>startLevel(Math.max(1,progress))} style={{padding:'14px',borderRadius:12,border:'1px solid #1a2235',background:'#111827',color:'#94a3b8',fontSize:14}}>
                🔄 Oxirgi daraja
              </button>
            )}
          </div>
        </div>

        {/* Recent levels */}
        {user.completedLevels?.length>0&&(
          <div style={{marginTop:16}}>
            <div style={{fontSize:13,color:'#64748b',marginBottom:8}}>So'nggi o'tilgan darajalar</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {[...user.completedLevels].sort((a,b)=>b-a).slice(0,15).map(l=>(
                <span key={l} style={{background:'rgba(16,185,129,0.1)',border:'1px solid rgba(16,185,129,0.3)',color:'#10b981',borderRadius:20,padding:'3px 10px',fontSize:12}}>
                  {l}✓
                </span>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// =============== ROOT APP ===============
function App(){
  const [user,setUser]=useState(()=>{
    try{
      const saved=localStorage.getItem('kelajak_current');
      if(saved){
        const u=JSON.parse(saved);
        const all=JSON.parse(localStorage.getItem('kelajak_users')||'{}');
        return all[u.username]||null;
      }
    }catch{}
    return null;
  });

  const handleLogin=(u)=>{
    localStorage.setItem('kelajak_current',JSON.stringify({username:u.username}));
    setUser(u);
  };
  const handleLogout=()=>{
    localStorage.removeItem('kelajak_current');
    setUser(null);
  };

  if(!user)return <LoginScreen onLogin={handleLogin}/>;
  return <TypingGame user={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
